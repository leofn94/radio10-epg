name: Generar EPG semanal

on:
  schedule:
  - cron: "0 */6 * * *"   # cada 6 hs
  workflow_dispatch:        # También se puede lanzar a mano desde GitHub
  
permissions:
  contents: write 
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install pytz

      - name: Generar EPG
        run: python generate_epg.py

      - name: Subir epg.xml al repositorio
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add epg.xml
          git diff --cached --quiet || git commit -m "EPG actualizado $(date +'%Y-%m-%d')"
          git push
